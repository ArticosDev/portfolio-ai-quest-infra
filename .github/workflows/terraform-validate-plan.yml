name: Terraform CI

on:
  pull_request:
    paths:
      - 'modules/**'
      - 'envs/**'
  workflow_dispatch:

jobs:
  fmt-validate-plan:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.5.7

      # 1) Autenticación (sólo si planeas un plan "real")
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      # 2) Generar vars (o usar backend=false si no lo necesitas)
      - name: Generate terraform.tfvars
        run: |
          cat > envs/dev/terraform.tfvars <<EOF
          aws_region             = "${{ secrets.TF_aws_region }}"
          project_name           = "${{ secrets.TF_project_name }}"
          environment            = "dev"
          cloudfront_price_class = "${{ secrets.TF_cloudfront_price_class }}"
          EOF

      # 3) Init real (o -backend=false para CI ligero)
      - name: Terraform Init
        run: terraform init -backend-config=envs/dev/backend.tf -input=false

      - name: Terraform fmt
        run: terraform fmt -check

      - name: Terraform validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -input=false -lock=false -var-file=envs/dev/terraform.tfvars